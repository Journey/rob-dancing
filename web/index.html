<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA — 未来机器人舞者</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="data/beats.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <div id="controls" style="display: none;">
            <h3>阿童木头部控制</h3>
            
            <div class="control-group">
                <label>水平摆动（左右）:</label>
                <input type="range" id="headYaw" min="-60" max="60" value="0">
                <span id="yawValue">0°</span>
            </div>
            
            <div class="control-group">
                <label>垂直摆动（上下）:</label>
                <input type="range" id="headPitch" min="-45" max="45" value="0">
                <span id="pitchValue">0°</span>
            </div>
            
            <div class="control-group">
                <label>倾斜摆动:</label>
                <input type="range" id="headRoll" min="-30" max="30" value="0">
                <span id="rollValue">0°</span>
            </div>
            
            <div class="control-group">
                <button onclick="resetHead()">重置头部</button>
                <button onclick="randomMove()">随机摆动</button>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="enableBeatSync" checked> 
                    启用节拍同步
                </label>
            </div>
        </div>
        
        <div id="audio-controls">
            <h3>音频控制</h3>
            <!-- <audio id="audioPlayer" src="statics/molihua.mp4" preload="metadata"></audio> -->
            <audio id="audioPlayer" src="statics/shuangjiegun.mp3" preload="metadata"></audio>
            <div>
                <button id="playPauseBtn" onclick="togglePlayPause()">播放</button>
                <button onclick="stopAudio()">停止</button>
            </div>
            <div id="progress-bar">
                <div id="progress"></div>
                <div id="beat-indicator"></div>
            </div>
            <div id="timeDisplay">00:00 / 00:00</div>
        </div>
        
        <div id="info">
            <p>• NOVA 未来机器人3D模型</p>
            <p>• 鼠标拖拽旋转视角 / 滚轮缩放</p>
            <p>• 播放音频观看关键帧舞蹈动作</p>
            <p>• 点击进度条跳转播放位置</p>
            <p>• 需先运行 make dance AUDIO=... 生成舞蹈数据</p>
        </div>
    </div>

    <script src="js/robtic.js"></script>
    <script>
        const { init, togglePlayPause, stopAudio, updateTimeDisplay } = robtic();
        init()
    </script>
</body>
</html>
